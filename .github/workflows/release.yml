name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create GitHub release
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag_name = context.ref.replace("refs/tags/", "");

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag: tag_name });
              core.info(`Release ${tag_name} already exists.`);
            } catch (error) {
              if (error.status !== 404) throw error;

              const notes = await github.rest.repos.generateReleaseNotes({
                owner,
                repo,
                tag_name
              });

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name,
                name: notes.data.name,
                body: notes.data.body,
                draft: false,
                prerelease: false
              });
            }

      - name: Publish Windows installer
        run: npm run publish:github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release notes
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag_name = context.ref.replace("refs/tags/", "");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag: tag_name });
            const notes = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name
            });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              name: notes.data.name,
              body: notes.data.body
            });
