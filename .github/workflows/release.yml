name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release files
        run: npm run dist

      - name: Ensure GitHub release
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notesFile = "md/releases/$tag.md"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists; keeping the existing release notes."
            exit 0
          }

          if (Test-Path $notesFile) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --title "Rest Stop $($tag.TrimStart('v'))" --notes-file $notesFile --verify-tag
          } else {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --title "Rest Stop $($tag.TrimStart('v'))" --generate-notes --verify-tag
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release files
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart("v")
          $files = @(
            "release/Rest-Stop-$version-windows.exe",
            "release/Rest-Stop-$version-windows.msi"
          )
          foreach ($file in $files) {
            if (!(Test-Path $file)) {
              Write-Error "Expected release file was not found: $file"
              exit 1
            }
          }
          gh release upload $tag @files --repo $env:GITHUB_REPOSITORY --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
