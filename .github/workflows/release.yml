name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish Windows installer
        run: npm run publish:github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release notes
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag_name = context.ref.replace("refs/tags/", "");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag: tag_name });
            const notes = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name
            });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              name: notes.data.name,
              body: notes.data.body
            });
