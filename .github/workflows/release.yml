name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release files
        run: npm run dist

      - name: Create GitHub release with files
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart("v")
          $notesFile = "md/releases/$tag.md"
          $files = @(
            "release/Rest-Stop-$version-windows.exe",
            "release/Rest-Stop-$version-windows.msi"
          )
          foreach ($file in $files) {
            if (!(Test-Path $file)) {
              Write-Error "Expected release file was not found: $file"
              exit 1
            }
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Replacing existing release $tag."
            gh release delete $tag --repo $env:GITHUB_REPOSITORY --yes
          }

          if (Test-Path $notesFile) {
            gh release create $tag @files --repo $env:GITHUB_REPOSITORY --title "Rest Stop $version" --notes-file $notesFile --verify-tag --draft
          } else {
            gh release create $tag @files --repo $env:GITHUB_REPOSITORY --title "Rest Stop $version" --generate-notes --verify-tag --draft
          }

          gh release edit $tag --repo $env:GITHUB_REPOSITORY --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
